<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

    <title>Quản Lý Giá Hàng</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #1a73e8; margin-top: 0; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        @media (min-width: 400px) {
            .input-group { flex-direction: row; }
        }

        input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
        }

        .btn-add {
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            min-width: 80px;
        }

        .search-box {
            width: 100%;
            margin-bottom: 20px;
            padding: 12px;
            border: 2px solid #1a73e8;
            border-radius: 8px;
            font-size: 16px;
            background-color: #e8f0fe;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 15px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .name { font-weight: 500; color: #333; overflow-wrap: break-word; flex: 1; padding-right: 10px; }
        .price { font-weight: bold; color: #d93025; white-space: nowrap; }

        /* Trạng thái đồng bộ */
        #syncStatus {
            text-align: center;
            font-size: 13px;
            margin-bottom: 12px;
            height: 18px;
            color: #888;
        }
        #syncStatus.syncing { color: #f5a623; }
        #syncStatus.ok      { color: #28a745; }
        #syncStatus.error   { color: #d93025; }
    </style>
</head>
<body>

<div class="container">
    <h2>Giá Hàng Nhanh</h2>

    <div id="syncStatus">Đang tải...</div>

    <div class="input-group">
        <input type="text" id="itemName" placeholder="Tên hàng...">
        <input type="number" id="itemPrice" placeholder="Giá...">
        <button class="btn-add" onclick="addItem()">Thêm</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Tìm tên mặt hàng..." onkeyup="searchItem()">

    <ul id="itemList"></ul>
</div>

<script>
    const BIN_ID     = "69ef6218856a6821897a740b";
    const MASTER_KEY = "$2a$10$J5CX1JDdzcOmfZ6kLK.mHeKYqD45z8Zwy.AKiAMpCsU.H/VK0PQ6q";
    const BASE_URL   = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    let allItems = [];

    function setStatus(msg, cls) {
        const el = document.getElementById('syncStatus');
        el.textContent = msg;
        el.className = cls || '';
    }

    // Đọc dữ liệu từ JSONBin
    async function loadFromCloud() {
        setStatus("Đang tải...", "syncing");
        try {
            const res = await fetch(`${BASE_URL}/latest`, {
                headers: { "X-Master-Key": MASTER_KEY }
            });
            const data = await res.json();
            allItems = data.record.items || [];
            renderList(allItems);
            setStatus("✓ Đã đồng bộ", "ok");
        } catch (e) {
            // Fallback localStorage nếu mất mạng
            const local = localStorage.getItem('danhSachGiaHang');
            allItems = local ? JSON.parse(local) : [];
            renderList(allItems);
            setStatus("Không có mạng – dùng dữ liệu cục bộ", "error");
        }
    }

    // Ghi dữ liệu lên JSONBin
    async function saveToCloud() {
        setStatus("Đang lưu...", "syncing");
        // Lưu local trước để không mất dữ liệu nếu mất mạng
        localStorage.setItem('danhSachGiaHang', JSON.stringify(allItems));
        try {
            await fetch(BASE_URL, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": MASTER_KEY
                },
                body: JSON.stringify({ items: allItems })
            });
            setStatus("✓ Đã lưu", "ok");
        } catch (e) {
            setStatus("Lưu cloud thất bại – đã giữ cục bộ", "error");
        }
    }

    function renderList(items) {
        const list = document.getElementById('itemList');
        list.innerHTML = "";
        items.forEach((item, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span class="name">${item.name}</span>
                <span class="price">${Number(item.price).toLocaleString()}đ</span>
                <button onclick="deleteItem(${index})" style="margin-left:10px; background:none; border:none; color:gray; font-size:16px; cursor:pointer;">✕</button>
            `;
            list.appendChild(li);
        });
    }

    async function addItem() {
        const nameInput  = document.getElementById('itemName');
        const priceInput = document.getElementById('itemPrice');
        const name  = nameInput.value.trim();
        const price = priceInput.value.trim();

        if (!name || !price) { alert("Nhập đủ tên và giá nhé!"); return; }

        allItems.unshift({ name, price });
        renderList(allItems);
        nameInput.value = "";
        priceInput.value = "";
        nameInput.focus();

        await saveToCloud();
    }

    async function deleteItem(index) {
        if (confirm("Xóa mặt hàng này?")) {
            allItems.splice(index, 1);
            renderList(allItems);
            await saveToCloud();
        }
    }

    function searchItem() {
        const filter = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allItems.filter(item => item.name.toLowerCase().includes(filter));
        renderList(filtered);
    }

    // Khởi động
    loadFromCloud();
</script>

</body>
</html>
